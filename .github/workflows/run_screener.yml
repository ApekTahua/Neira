name: Run Quant Screener Daily

on:
  schedule:
    # 18:00 WIB (11:00 UTC) berjalan HANYA di hari Senin-Jumat
    - cron: '0 11 * * 1-5'
  workflow_dispatch: # Fitur ini agar kamu bisa klik "Run" manual kapan saja dari web

jobs:
  execute-screener:
    runs-on: ubuntu-latest

    steps:
    - name: Ambil kode dari repository
      uses: actions/checkout@v4

    - name: Pasang Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
        cache: 'pip'

    - name: Install Library Pendukung
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Jalankan Script Python Quant Screener
      env:
        SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
        SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
        TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
        TELEGRAM_USER_ID: ${{ secrets.TELEGRAM_USER_ID }}
      run: python src/screener.py
